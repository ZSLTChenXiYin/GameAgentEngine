<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>灰港边境 - GameAgentEngine Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">
        <h1>灰港边境</h1>
        <div class="badges">
          <span id="statusDot" class="dot off"></span>
          <span id="statusLabel" class="badge">未连接</span>
          <span id="versionBadge" class="badge"></span>
          <span id="turnBadge" class="badge">第 0 回合</span>
        </div>
      </div>
      <div class="topbar-actions">
        <button id="initBtn" class="primary-btn">初始化世界</button>
        <button id="advanceBtn" class="primary-btn" disabled>推进回合</button>
        <button id="dialogueBtn">顾问对话</button>
        <button id="logBtn">事件记录</button>
        <button id="configBtn">设置</button>
      </div>
    </header>
    <main class="main">
      <section class="panel left-panel">
        <div class="panel-hd"><span class="panel-title">世界概览</span></div>
        <div id="worldOverview" class="panel-bd"><div class="placeholder">等待连接引擎...</div></div>
      </section>
      <section class="panel center-panel">
        <div class="panel-hd"><span class="panel-title">当前议题</span></div>
        <div id="incidentArea" class="panel-bd incident-area"><div class="placeholder">初始化世界后，议题将在这里显示。</div></div>
      </section>
      <section class="panel right-panel">
        <div class="panel-hd"><span class="panel-title">边境资源</span></div>
        <div id="resourcePanel" class="panel-bd"><div class="placeholder">等待数据同步...</div></div>
      </section>
    </main>
  </div>
  <div id="dialogueOverlay" class="overlay">
    <div class="modal dialogue-modal">
      <div class="modal-hd">
        <div><span class="eyebrow">顾问对话</span><h3 id="chatTitle">选择一位顾问</h3></div>
        <button id="closeDialogue" class="close-btn">&times;</button>
      </div>
      <div id="advisorTabs" class="advisor-tabs"></div>
      <div class="quick-actions">
        <button id="qaSuggest" class="ghost">问建议</button>
        <button id="qaRisk" class="ghost">问风险</button>
        <button id="qaStatus" class="ghost">问局势</button>
      </div>
      <div id="chatLog" class="chat-log"></div>
      <div class="chat-input">
        <input id="chatInput" type="text" placeholder="输入你的问题..." disabled>
        <button id="sendBtn" disabled>发送</button>
      </div>
    </div>
  </div>
  <div id="logOverlay" class="overlay side">
    <div class="side-panel">
      <div class="modal-hd">
        <div><span class="eyebrow">事件记录</span><h3>线索与日志</h3></div>
        <button id="closeLog" class="close-btn">&times;</button>
      </div>
      <div id="eventLog" class="event-log"></div>
    </div>
  </div>
  <div id="configOverlay" class="overlay">
    <div class="modal config-modal">
      <div class="modal-hd"><h3>连接设置</h3><button id="closeConfig" class="close-btn">&times;</button></div>
      <div class="config-form">
        <label>服务地址</label><input id="cfgUrl" type="text" value="http://127.0.0.1:8080">
        <label>API 密钥</label><input id="cfgKey" type="text" value="dev-key">
        <button id="saveConfig" class="primary-btn">保存并连接</button>
      </div>
    </div>
  </div>
  <div id="loadingOverlay" class="overlay loading">
    <div class="loading-box"><div class="spinner"></div><span id="loadingText">加载中...</span></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
